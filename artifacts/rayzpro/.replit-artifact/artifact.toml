kind = "web"
previewPath = "/"
title = "RAYZPRO — Deriv Companion"
version = "1.0.0"
id = "artifacts/rayzpro"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24881

[services.development]
run = "pnpm --filter @workspace/tradehub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradehub", "run", "build" ]
serve = "static"
publicDir = "artifacts/tradehub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24881"
BASE_PATH = "/"
